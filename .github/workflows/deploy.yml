name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Add CNAME to build output
              run: |
                  if [ -f CNAME ]; then
                      cp CNAME build/CNAME
                  fi

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: build

            - name: Deploy to GitHub Pages
              id: deploy
              uses: actions/deploy-pages@v4
